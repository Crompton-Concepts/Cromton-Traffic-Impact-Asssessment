name: Dataset Update Check

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-datasets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check and update datasets
        run: python scripts/check_and_update_datasets.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(data): refresh dataset releases"
          title: "chore(data): automated dataset refresh"
          body: |
            Automated dataset update generated by scheduled release detection.

            Includes:
            - dataset file refresh
            - manifest hash/version refresh
            - validation gate checks
          branch: chore/auto-dataset-refresh
          delete-branch: true
